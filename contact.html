<!DOCTYPE html>
<html class="no-js" lang="en">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Contact — Afrin Moury</title>
    <meta name="description" content="Get in touch with Afrin Jahan Moury, Architecture Graduate." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/style.css" />
    <script>(function(){var t=localStorage.getItem("theme");if(t)document.documentElement.setAttribute("data-theme",t);})();</script>
</head>

<body class="loading">

    <div class="loader">
        <svg width="120" height="30" viewBox="0 0 120 30" xmlns="http://www.w3.org/2000/svg">
            <circle cx="15" cy="15" r="15">
                <animate attributeName="r" from="15" to="15" begin="0s" dur="0.8s" values="15;9;15" calcMode="linear" repeatCount="indefinite"/>
                <animate attributeName="fill-opacity" from="1" to="1" begin="0s" dur="0.8s" values="1;.5;1" calcMode="linear" repeatCount="indefinite"/>
            </circle>
            <circle cx="60" cy="15" r="9" fill-opacity="0.3">
                <animate attributeName="r" from="9" to="9" begin="0s" dur="0.8s" values="9;15;9" calcMode="linear" repeatCount="indefinite"/>
                <animate attributeName="fill-opacity" from="0.5" to="0.5" begin="0s" dur="0.8s" values=".5;1;.5" calcMode="linear" repeatCount="indefinite"/>
            </circle>
            <circle cx="105" cy="15" r="15">
                <animate attributeName="r" from="15" to="15" begin="0s" dur="0.8s" values="15;9;15" calcMode="linear" repeatCount="indefinite"/>
                <animate attributeName="fill-opacity" from="1" to="1" begin="0s" dur="0.8s" values="1;.5;1" calcMode="linear" repeatCount="indefinite"/>
            </circle>
        </svg>
    </div>

    <!-- ============================================================
         HEADER / SIDEBAR
    ============================================================ -->
    <div id="site-header"></div>

    <!-- ============================================================
         MAIN CONTENT — CONTACT
    ============================================================ -->
    <div class="page">
        <div class="page__content">
            <section class="intro">
                <div class="intro-wrap">

                    <h1>Get in Touch</h1>
                    <p class="about-bio">Whether you'd like to discuss a project, explore collaboration opportunities, or simply say hello — I'd love to hear from you.</p>

                    <!-- Contact Info -->
                    <div class="contact-info">
                        <h2>Contact Information</h2>
                        <div class="contact-info-row">
                            <i class="fas fa-envelope" aria-hidden="true"></i>
                            <span><a href="mailto:afrinjahan021019@gmail.com">afrinjahan021019@gmail.com</a></span>
                        </div>
                        <div class="contact-info-row">
                            <i class="fas fa-phone" aria-hidden="true"></i>
                            <span><a href="tel:+14643006613">+1 464 300 6613</a></span>
                        </div>
                        <div class="contact-info-row">
                            <i class="fas fa-map-marker-alt" aria-hidden="true"></i>
                            <span>1901 N Lincoln Ave. APT 310, Urbana, IL 61801, USA</span>
                        </div>
                        <div class="contact-info-row">
                            <i class="fab fa-linkedin-in" aria-hidden="true"></i>
                            <span><a href="https://www.linkedin.com" target="_blank" rel="noopener">LinkedIn</a></span>
                        </div>
                        <div class="contact-info-row">
                            <i class="fab fa-instagram" aria-hidden="true"></i>
                            <span><a href="https://www.instagram.com" target="_blank" rel="noopener">Instagram</a></span>
                        </div>
                    </div>

                    <!-- Contact Form -->
                    <form class="contact-form" action="#" method="post" novalidate>
                        <div class="contact-form__item">
                            <label class="contact-form__label" for="name">Name</label>
                            <input class="contact-form__input" type="text" id="name" name="name" placeholder="Your name" required />
                        </div>

                        <div class="contact-form__item">
                            <label class="contact-form__label" for="email">Email</label>
                            <input class="contact-form__input" type="email" id="email" name="email" placeholder="your@email.com" required />
                        </div>

                        <div class="contact-form__item">
                            <label class="contact-form__label" for="subject">Subject</label>
                            <input class="contact-form__input" type="text" id="subject" name="subject" placeholder="How can I help?" />
                        </div>

                        <div class="contact-form__item">
                            <label class="contact-form__label" for="message">Message</label>
                            <textarea class="contact-form__textarea" id="message" name="message" placeholder="Your message…" required></textarea>
                        </div>

                        <div class="contact-form__item">
                            <button type="submit" class="btn">Send Message</button>
                        </div>
                    </form>

                </div>
            </section>
        </div>
    </div>

    <!-- Mobile footer -->
    <div id="site-footer"></div>

    <script src="js/partials.js"></script>
    <script src="js/main.js"></script></body>
</html>
